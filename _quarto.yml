project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    - assets/Berns_CV.pdf

website:
  title: "Joris Berns"
  description: "Joris Berns — Assistant Professor in Organization Studies, Tilburg University. Research on executive communication, behavioral decision-making, and corporate governance."
  site-url: https://jorisberns.com
  favicon: assets/favicon.svg
  open-graph: true
  navbar:
    pinned: true
    left:
      - text: "About"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Talks & Service"
        href: talks.qmd
      - text: "Resources"
        href: resources.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "CV"
        href: cv.qmd
    right:
      - icon: envelope
        href: mailto:j.l.m.berns@tilburguniversity.edu
        aria-label: Email
      - icon: github
        href: https://github.com/jlmberns
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/jorisberns
        aria-label: LinkedIn
  page-footer:
    left: |
      © 2026 Joris Berns · Assistant Professor, Organization Studies, Tilburg University
    right: |
      Built with [Quarto](https://quarto.org) · [Source](https://github.com/jlmberns/jorisberns.com)

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: false
    page-layout: article
    grid:
      body-width: 860px
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
